# Fail2Ban jail for Bramble (Phase-3 Decision F).
#
# Install: copy to /etc/fail2ban/jail.d/bramble.conf, then
#   systemctl restart fail2ban
#
# Reads the bramble.service journal (backend = systemd), so it needs
# no log file. The systemd backend requires the python3-systemd
# package - see docs/deployment.md.
#
# Policy: 3 failed auth attempts -> ban. The first ban lasts 1 hour;
# bantime.increment escalates repeat offenders up to bantime.maxtime
# (one year here - Fail2Ban has no literal permanent ban, so a year
# is the practical equivalent).
#
# Phase-6 caveat (OAuth mode, BRAMBLE_ENABLE_OAUTH=true): this jail keys on
# the auth_failed JSON event, which is emitted by the static-bearer path
# only. In OAuth mode the static-token verifier is deliberately silent (a
# token it does not know may be a valid OAuth token tried by another
# verifier) and bad bearers are rejected at the framework's ASGI auth layer
# with a 401 - which does NOT emit auth_failed. So this jail does not fire
# for OAuth-path brute force. Do NOT add a jail that bans on /mcp 401s: an
# unauthenticated /mcp probe returning 401 is the FIRST, legitimate step of
# Claude's OAuth discovery, so banning it would ban real clients. The AS
# endpoints (/authorize, /token, /register) are the real brute-force
# surface; if abuse appears after go-live, add a TUNED jail there with a
# lenient maxretry (legitimate clients retry too) - per the rollout plan,
# observe first, then tune. Codes are single-use and short-lived, which
# limits the value of guessing in the meantime.

[bramble]
enabled       = true
backend       = systemd
filter        = bramble
journalmatch  = _SYSTEMD_UNIT=bramble.service
port          = http,https
maxretry      = 3
findtime      = 10m
bantime       = 1h
bantime.increment = true
bantime.maxtime   = 1y
