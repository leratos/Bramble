# Fail2Ban jail for Bramble (Phase-3 Decision F).
#
# Install: copy to /etc/fail2ban/jail.d/bramble.conf, then
#   systemctl restart fail2ban
#
# Reads the bramble.service journal (backend = systemd), so it needs
# no log file. The systemd backend requires the python3-systemd
# package - see docs/deployment.md.
#
# Policy: 3 failed auth attempts -> ban. The first ban lasts 1 hour;
# bantime.increment escalates repeat offenders up to bantime.maxtime
# (one year here - Fail2Ban has no literal permanent ban, so a year
# is the practical equivalent).

[bramble]
enabled       = true
backend       = systemd
filter        = bramble
journalmatch  = _SYSTEMD_UNIT=bramble.service
port          = http,https
maxretry      = 3
findtime      = 10m
bantime       = 1h
bantime.increment = true
bantime.maxtime   = 1y
