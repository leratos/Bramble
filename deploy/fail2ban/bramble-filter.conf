# Fail2Ban filter for Bramble (Phase-3 Decision F).
#
# Matches the auth_failed JSON log event emitted by
# bramble.auth_validator.AuthValidator on every failed authentication.
# A matching log line looks like:
#
#   {"asctime": "...", "name": "bramble.auth_validator",
#    "levelname": "WARNING", "message": "authentication failed",
#    "event": "auth_failed", "client_ip": "203.0.113.7"}
#
# Install: copy to /etc/fail2ban/filter.d/bramble.conf

[Definition]
failregex = "event":\s*"auth_failed".*"client_ip":\s*"<HOST>"
ignoreregex =
