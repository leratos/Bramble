# Bramble MCP server - Nginx reverse-proxy directives (Phase-3 Decision G).
#
# Paste the location block below into Plesk:
#   Domains > journal.last-strawberry.com > Apache & nginx Settings
#   > "Additional nginx directives"
#
# Plesk owns the server{} block and the Let's Encrypt TLS certificate.
# These directives only add the reverse proxy to the local Bramble
# process, which binds 127.0.0.1:8765 and is never exposed directly.

# ---------------------------------------------------------------------------
# Phase 6: OAuth 2.1 Authorization Server (only needed when the server runs
# with BRAMBLE_ENABLE_OAUTH=true). FastMCP serves the discovery documents and
# the AS endpoints at the HOST ROOT, not under /mcp, so they must be proxied
# through with their path intact. Absolute URLs inside the metadata come from
# the server's configured BRAMBLE_OAUTH_PUBLIC_BASE_URL, not from request
# headers, so only Host/proto hygiene headers are required here.
#
# These blocks are inert if OAuth is disabled (the backend simply has no such
# routes and returns 404); leaving them in place does no harm.

# Discovery: /.well-known/oauth-authorization-server (RFC 8414) and
# /.well-known/oauth-protected-resource/mcp (RFC 9728). Scoped to the
# "oauth-" prefix so the Let's Encrypt /.well-known/acme-challenge path is
# untouched.
location ^~ /.well-known/oauth- {
    proxy_pass http://127.0.0.1:8765;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# AS endpoints plus the Phase-6.6 resource-owner gate:
#   /authorize  - browser authorize request (the gate shows owner login +
#                 consent here before the framework issues a code)
#   /oauth/login, /oauth/consent - the gate's login and consent form POSTs
#   /token      - auth-code / refresh exchange
#   /register   - RFC 7591 dynamic client registration
#   /revoke     - RFC 7009 token revocation
# Exact-path regex so unrelated paths are not captured. X-Forwarded-Proto is
# important here: it tells the backend the request is https so the owner
# session cookie's Secure attribute is honoured.
location ~ ^/(authorize|token|register|revoke|oauth/(login|consent))$ {
    proxy_pass http://127.0.0.1:8765;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 64k;
}

# Exact /mcp (no trailing slash). The OAuth protected-resource metadata
# advertises the resource as exactly ".../mcp", and a prefix `location /mcp/`
# does NOT match a request to `/mcp`, so without this block an OAuth client
# following the advertised resource URL would miss the proxy and hit Plesk's
# default handler. Streaming clients that use the trailing slash keep using
# the `location /mcp/` block below.
location = /mcp {
    proxy_pass http://127.0.0.1:8765/mcp;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    client_max_body_size 4m;
}

location /mcp/ {
    # The FastMCP endpoint is exactly /mcp (no trailing slash). Giving
    # proxy_pass an explicit /mcp URI makes nginx replace the matched
    # /mcp/ location prefix, so the backend always receives /mcp and
    # never issues a 307 redirect (/mcp/ -> /mcp).
    proxy_pass http://127.0.0.1:8765/mcp;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;

    # Set X-Forwarded-For to the direct client address only. Do NOT
    # use $proxy_add_x_forwarded_for here: that would append to any
    # X-Forwarded-For the client sent, letting a caller prepend a
    # forged IP. Bramble trusts this header (it arrives from
    # 127.0.0.1) and reads its left-most entry, so the header must
    # contain exactly the real client IP and nothing attacker-chosen.
    proxy_set_header X-Forwarded-For   $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MCP's streamable-HTTP transport keeps responses open; disable
    # buffering and allow long-lived connections.
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;

    # Journal entries can be multi-page; lift nginx's 1 MB default so
    # a large journal_append does not fail with 413.
    client_max_body_size 4m;
}