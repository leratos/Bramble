<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bramble — sign in to authorize</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 26rem; margin: 4rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.6rem 1.2rem; font-weight: 600; cursor: pointer; }
    .error { color: #b00020; margin-top: 1rem; font-weight: 600; }
    .hint { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Sign in to authorize this connector</h1>
  <p class="hint">Only the Bramble owner may authorize access to the journal.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/oauth/login">
    <input type="hidden" name="next" value="{{ next_url }}">
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="username" autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password">
    <button type="submit">Continue</button>
  </form>
</body>
</html>
