<!doctype html>
<html lang="{{ lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bramble Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/admin.css') }}">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="login-title">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">B</span>
          <div>
            <h1 id="login-title">Bramble Admin</h1>
            <p>{{ t('text_internal_access') }}</p>
          </div>
        </div>
        {% if error %}
          <p class="alert" role="alert">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('login_submit') }}">
          <input type="hidden" name="next" value="{{ next_url }}">
          <label>
            <span>{{ t('label_user') }}</span>
            <input name="username" autocomplete="username" required autofocus>
          </label>
          <label>
            <span>{{ t('label_password') }}</span>
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">{{ t('action_login') }}</button>
        </form>
      </section>
    </main>
  </body>
</html>
